name: 2 - Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: Prepare web folder
        run: |
          mkdir -p www/icons
          cp index.html www/
          cp manifest.json www/ || true
          cp sw.js www/ || true
          cp privacy.html www/ || true
          cp terms.html www/ || true
          cp icons/icon-192.png www/icons/ || true
          cp icons/icon-512.png www/icons/ || true
          cp icons/icon-maskable-512.png www/icons/ || true

      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.atlasquest.app",
            "appName": "AtlasQuest",
            "webDir": "www",
            "server": { "androidScheme": "https" }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Set app icons
        run: |
          pip install Pillow --quiet
          python3 - << 'EOF'
          from PIL import Image
          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base = 'android/app/src/main/res'
          img = Image.open('icons/icon-512.png').convert('RGBA')
          for d,s in sizes.items():
              r = img.resize((s,s), Image.LANCZOS)
              r.save(f'{base}/{d}/ic_launcher.png')
              r.save(f'{base}/{d}/ic_launcher_round.png')
          print('Icons done')
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/atlasquest.keystore

      - name: Configure Gradle signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android.signingConfigs {
            release {
              storeFile file('atlasquest.keystore')
              storePassword System.getenv('KEYSTORE_PASSWORD')
              keyAlias System.getenv('KEY_ALIAS')
              keyPassword System.getenv('KEY_PASSWORD')
            }
          }
          android.buildTypes.release.signingConfig android.signingConfigs.release
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AtlasQuest-APK
          retention-days: 30
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AtlasQuest-AAB-PlayStore
          retention-days: 30
          path: android/app/build/outputs/bundle/release/app-release.aab
