name: 1 - Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          PASS=$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9' | head -c 20)
          echo "PASSWORD=$PASS" >> $GITHUB_ENV
          keytool -genkeypair -v \
            -keystore atlasquest.keystore \
            -alias atlasquest \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" \
            -keypass "$PASS" \
            -dname "CN=AtlasQuest,O=AtlasQuest,C=DZ"
          base64 -w 0 atlasquest.keystore > keystore.b64.txt
          echo "=============================" > LISEZ-MOI.txt
          echo "MOT DE PASSE : $PASS" >> LISEZ-MOI.txt
          echo "ALIAS       : atlasquest" >> LISEZ-MOI.txt
          echo "=============================" >> LISEZ-MOI.txt
          echo "Copiez le contenu de keystore.b64.txt" >> LISEZ-MOI.txt
          echo "dans le secret GitHub KEYSTORE_BASE64" >> LISEZ-MOI.txt
          echo "Utilisez le mot de passe pour:" >> LISEZ-MOI.txt
          echo "  KEYSTORE_PASSWORD" >> LISEZ-MOI.txt
          echo "  KEY_PASSWORD" >> LISEZ-MOI.txt
          echo "Utilisez atlasquest pour KEY_ALIAS" >> LISEZ-MOI.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-SAUVEGARDER
          retention-days: 7
          path: |
            atlasquest.keystore
            keystore.b64.txt
            LISEZ-MOI.txt
