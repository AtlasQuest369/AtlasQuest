name: 1 - Generate Signing Keystore (run ONCE)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate random passwords
        id: pwd
        run: |
          STOREPASS=$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9' | head -c 20)
          KEYPASS=$STOREPASS
          echo "storepass=$STOREPASS" >> "$GITHUB_OUTPUT"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore atlasquest.keystore \
            -alias atlasquest \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ steps.pwd.outputs.storepass }}" \
            -keypass "${{ steps.pwd.outputs.storepass }}" \
            -dname "CN=AtlasQuest, OU=AtlasQuest, O=AtlasQuest Studio, L=Algiers, S=Algiers, C=DZ"

      - name: Encode keystore to base64
        run: base64 -w 0 atlasquest.keystore > atlasquest.keystore.base64.txt

      - name: Write instructions
        run: |
          cat > LISEZ-MOI-IMPORTANT.txt << EOF
          ====================================================
          ATLASQUEST - CLE DE SIGNATURE ANDROID
          ====================================================

          CE FICHIER CONTIENT DES INFORMATIONS SECRETES.
          NE LE PARTAGE JAMAIS, NE LE POSTE JAMAIS EN LIGNE.

          1) Mot de passe (storePassword ET keyPassword) :
          ${{ steps.pwd.outputs.storepass }}

          2) Alias de la cle :
          atlasquest

          3) Fichier "atlasquest.keystore" :
          -> Garde ce fichier en lieu sur (Google Drive prive,
             email a toi-meme, etc.) Tu en auras besoin pour
             CHAQUE future mise a jour de l'application.

          4) Fichier "atlasquest.keystore.base64.txt" :
          -> Ouvre-le, copie tout son contenu (une longue ligne
             de texte). Tu vas le coller dans un "Secret" GitHub
             nomme KEYSTORE_BASE64 (voir instructions Claude).

          5) Cree aussi ces secrets GitHub avec la meme valeur
             que le mot de passe ci-dessus :
             - KEYSTORE_PASSWORD
             - KEY_PASSWORD
             Et ce secret avec la valeur "atlasquest" :
             - KEY_ALIAS
          ====================================================
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlasquest-keystore-SAUVEGARDER
          path: |
            atlasquest.keystore
            atlasquest.keystore.base64.txt
            LISEZ-MOI-IMPORTANT.txt
          retention-days: 7
          
