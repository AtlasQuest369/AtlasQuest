name: 5 - Generate Ines Kids Keystore

# Génère la clé de DÉPÔT (upload key) dédiée à Ines Kids, à usage unique.
# Récupère l'artefact, garde-le en lieu sûr, puis crée les secrets GitHub :
#   INES_KEYSTORE_BASE64, INES_KEYSTORE_PASSWORD, INES_KEY_ALIAS, INES_KEY_PASSWORD
# NB : avec Play App Signing, cette clé sert à SIGNER les envois ; Google gère
# la clé d'app finale. Ne la perds pas — elle est nécessaire pour chaque mise à jour.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate Ines upload keystore
        run: |
          PASS=$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9' | head -c 24)
          keytool -genkeypair -v \
            -keystore ineskids-upload.keystore \
            -alias ineskids \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" \
            -keypass "$PASS" \
            -dname "CN=Ines Kids,O=Ines Kids,C=DZ"
          base64 -w 0 ineskids-upload.keystore > ineskids-keystore.b64.txt
          {
            echo "============================================="
            echo " CLÉ DE DÉPÔT INES KIDS — À GARDER SECRÈTE"
            echo "============================================="
            echo "MOT DE PASSE : $PASS"
            echo "ALIAS        : ineskids"
            echo ""
            echo "Crée ces 4 secrets GitHub (Settings > Secrets > Actions) :"
            echo "  INES_KEYSTORE_BASE64    = contenu de ineskids-keystore.b64.txt"
            echo "  INES_KEYSTORE_PASSWORD  = $PASS"
            echo "  INES_KEY_ALIAS          = ineskids"
            echo "  INES_KEY_PASSWORD       = $PASS"
            echo ""
            echo "Sauvegarde aussi ineskids-upload.keystore hors de GitHub."
          } > LISEZ-MOI-INES.txt

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: INES-KEYSTORE-A-SAUVEGARDER
          retention-days: 7
          path: |
            ineskids-upload.keystore
            ineskids-keystore.b64.txt
            LISEZ-MOI-INES.txt
