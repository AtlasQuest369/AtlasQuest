workflows:
  android-workflow:
    name: AtlasQuest Android Build
    max_build_duration: 60
    environment:
      node: 22.0.0
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Install Capacitor & setup Android
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android || true
          npx cap sync android

      - name: Setup network security config
        script: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="false">
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF

      - name: Build Android APK signed
        script: |
          cd android
          chmod +x gradlew
          keytool -genkey -v \
            -keystore atlasquest.keystore \
            -alias atlasquest \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass atlasquest2024 \
            -keypass atlasquest2024 \
            -dname "CN=AtlasQuest, OU=Mobile, O=AtlasQuest, L=Algiers, S=Algiers, C=DZ"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/atlasquest.keystore \
            -Pandroid.injected.signing.store.password=atlasquest2024 \
            -Pandroid.injected.signing.key.alias=atlasquest \
            -Pandroid.injected.signing.key.password=atlasquest2024

    artifacts:
      - android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - positif.vibes369@gmail.com
        notify:
          success: true
          failure: true
